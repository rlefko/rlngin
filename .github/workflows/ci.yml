name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-17
          sudo ln -sf /usr/bin/clang-format-17 /usr/bin/clang-format

      - name: Check formatting
        run: make format-check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build engine
        # GitHub's ubuntu-latest runners are Cascade Lake / Zen3 class, both of
        # which cleanly support the x86-64-v3 psABI tier. Compiling here rather
        # than on native exercises the PEXT sliding-attack path end-to-end.
        run: make build ARCH=x86-64-v3

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: rlngin
          path: build/rlngin

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Catch2
        run: make fetch-catch2

      - name: Run tests
        run: make test ARCH=x86-64-v3

  screen-pr:
    name: PR Smoke Screen
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Download dev engine artifact
        uses: actions/download-artifact@v4
        with:
          name: rlngin
          path: build
      - run: chmod +x build/rlngin

      - name: Build base engine from main
        # Match the dev binary's compile tier so the screen compares like with
        # like rather than O3/PEXT vs the legacy O2 magic path.
        run: |
          git fetch origin main
          git worktree add /tmp/base origin/main
          make -C /tmp/base build ARCH=x86-64-v3
          cp /tmp/base/build/rlngin build/rlngin-base
          chmod +x build/rlngin-base
          git worktree remove /tmp/base

      - name: Download fastchess
        run: |
          curl -sL https://github.com/Disservin/fastchess/releases/latest/download/fastchess-linux-x86-64.tar -o fastchess.tar
          tar xf fastchess.tar
          cp fastchess-linux-x86-64/fastchess ./fastchess
          chmod +x ./fastchess

      - name: Download opening book
        run: make fetch-openings

      - name: Run screen (50 pairs, 10+0.1)
        run: ENGINE_DEV=./build/rlngin ENGINE_BASE=./build/rlngin-base ./scripts/screen.sh 50 10+0.1 2

      - name: Format results
        id: results
        run: |
          {
            echo "comment<<EOF"
            ./scripts/format-screen-comment.sh results/screen.log "100 games (50 pairs)" "10+0.1"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: screen-results
          message: ${{ steps.results.outputs.comment }}

      - name: Update README benchmark
        run: ./scripts/update-readme-benchmark.sh results/screen.log "100 games (50 pairs)" "10+0.1"

      - name: Push README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "📊 Update benchmark results"
          git push
