name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-17
          sudo ln -sf /usr/bin/clang-format-17 /usr/bin/clang-format

      - name: Check formatting
        run: make format-check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build engine
        run: make build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: rlngin
          path: build/rlngin

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Catch2
        run: make fetch-catch2

      - name: Run tests
        run: make test

  screen-pr:
    name: PR Smoke Screen
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download engine artifact
        uses: actions/download-artifact@v4
        with:
          name: rlngin
          path: build
      - run: chmod +x build/rlngin

      - name: Download fastchess
        run: |
          curl -sL https://github.com/Disservin/fastchess/releases/latest/download/fastchess-linux-x86-64.tar -o fastchess.tar
          tar xf fastchess.tar
          cp fastchess-linux-x86-64/fastchess ./fastchess
          chmod +x ./fastchess

      - name: Download opening book
        run: make fetch-openings

      - name: Run screen (50 pairs, 10+0.1)
        run: ./scripts/screen.sh 50 10+0.1 2

      - name: Parse results
        id: results
        run: |
          SUMMARY=$(grep -A4 "Results of" results/screen.log || tail -10 results/screen.log)
          {
            echo "summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: screen-results
          message: |
            ## Self-Play Screen Results

            ```
            ${{ steps.results.outputs.summary }}
            ```

            <sub>100 games (50 pairs) | tc=10+0.1 | UHO_Lichess_4852_v1.epd</sub>

  screen-main:
    name: Main Benchmark
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download engine artifact
        uses: actions/download-artifact@v4
        with:
          name: rlngin
          path: build
      - run: chmod +x build/rlngin

      - name: Download fastchess
        run: |
          curl -sL https://github.com/Disservin/fastchess/releases/latest/download/fastchess-linux-x86-64.tar -o fastchess.tar
          tar xf fastchess.tar
          cp fastchess-linux-x86-64/fastchess ./fastchess
          chmod +x ./fastchess

      - name: Download opening book
        run: make fetch-openings

      - name: Run screen (500 pairs, 60+0.6)
        run: ./scripts/screen.sh 500 60+0.6 4

      - name: Update README
        run: ./scripts/update-readme-benchmark.sh results/screen.log

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update benchmark results"
          git push
