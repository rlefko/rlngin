name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "ryan/**"]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-17
          sudo ln -sf /usr/bin/clang-format-17 /usr/bin/clang-format

      - name: Check formatting
        run: make format-check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build engine
        run: make build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: rlngin
          path: build/rlngin

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Catch2
        run: make fetch-catch2

      - name: Run tests
        run: make test

  screen-pr:
    name: PR Smoke Screen
    if: >-
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'no play changes')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Download dev engine artifact
        uses: actions/download-artifact@v4
        with:
          name: rlngin
          path: build
      - run: chmod +x build/rlngin

      - name: Build base engine from main
        run: |
          git fetch origin main
          git worktree add /tmp/base origin/main
          make -C /tmp/base build
          cp /tmp/base/build/rlngin build/rlngin-base
          chmod +x build/rlngin-base
          git worktree remove /tmp/base

      - name: Build fastchess from source
        run: |
          git clone --depth 1 https://github.com/Disservin/fastchess.git /tmp/fastchess
          make -C /tmp/fastchess -j"$(nproc)"
          cp /tmp/fastchess/fastchess ./fastchess
          chmod +x ./fastchess

      - name: Download opening book
        run: make fetch-openings

      - name: Run screen (100 pairs, 10+0.1)
        run: ENGINE_DEV=./build/rlngin ENGINE_BASE=./build/rlngin-base ./scripts/screen.sh 100 10+0.1 2

      - name: Format results
        id: results
        run: |
          {
            echo "comment<<EOF"
            ./scripts/format-screen-comment.sh results/screen.log "200 games (100 pairs)" "10+0.1"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: screen-results
          message: ${{ steps.results.outputs.comment }}

      - name: Update README benchmark
        run: ./scripts/update-readme-benchmark.sh results/screen.log "200 games (100 pairs)" "10+0.1"

      - name: Push README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "📊 Update benchmark results"
          git push
